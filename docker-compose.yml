services:
  frontend:
    image: shivam0023/nova-frontend:latest
    ports:
      - "80:3000" # Mapping port 80 to 3000 so users can just visit the IP
    environment:
      - VITE_API_URL=${VITE_API_URL}
    depends_on:
      - backend

  backend:
    image: shivam0023/nova-backend:latest
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
